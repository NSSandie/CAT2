<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Courses</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand"
href="index.html">

Student Hub

</a>

</div>

</nav>

<section class="container py-5">

<h1>Courses</h1>

<input
class="form-control mb-4"
id="courseSearch"
placeholder="Search course">

<div id="courseList">

<div class="card mb-3">

<div class="card-body">

Computer Science

</div>

</div>

<div class="card mb-3">

<div class="card-body">

Information Technology

</div>

</div>

<div class="card mb-3">

<div class="card-body">

Business Administration

</div>

</div>

<div class="card mb-3">

<div class="card-body">

Data Analytics

</div>

</div>

</div>

</section>

<footer>

<p>
© 2026 Student Hub
</p>

</footer>

<script>

document
.getElementById(
"courseSearch"
)

.addEventListener(
"keyup",

function(){

let value=
this.value
.toLowerCase();

let cards=
document.querySelectorAll(
"#courseList .card"
);

cards.forEach(

card=>{

card.style.display=

card.innerText
.toLowerCase()
.includes(value)

?

"block"

:

"none";

}

);

}

);

</script>

<script src="js/script.js"></script>

</body>

</html>
