<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>Contact</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand"
href="index.html">

Student Hub

</a>

</div>

</nav>

<section class="container py-5">

<h1>

Contact Us

</h1>

<form
id="contactForm">

<input
type="text"
id="name"
class="form-control mb-3"
placeholder="Name">

<input
type="email"
id="email"
class="form-control mb-3"
placeholder="Email">

<textarea
id="message"
class="form-control mb-3"
rows="5"
placeholder="Message">
</textarea>

<button
class="btn btn-primary">

Send

</button>

</form>

</section>

<footer>

<p>
© BBIT STUDENT 2026
</p>

</footer>

<script>

document
.getElementById(
"contactForm"
)

.addEventListener(
"submit",

function(e){

e.preventDefault();

let name=
document
.getElementById(
"name"
).value;

let email=
document
.getElementById(
"email"
).value;

if(
name===""
||

email===""

){

alert(
"Fill all fields"
);

return;

}

alert(
"Message sent"
);

});

</script>

<script src="js/script.js"></script>

</body>

</html>
